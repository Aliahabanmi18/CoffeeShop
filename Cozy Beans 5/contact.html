<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Cozy Beans</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f7efe6;
            font-family: 'Georgia', serif;
        }

        .top-strip {
            background-color: #4b2e2b;
            color: white;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .nav-link, .navbar-brand, h1, h2, h3, h4 {
            color: #4b2e2b !important;
        }

        .btn-coffee {
            background-color: #3c2623;
            color: #f7efe6;
            border-radius: 30px;
            padding: 10px 25px;
        }

        .footer-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 35px;
        }

        .footer-link {
            display: block;
            color: #4b2e2b;
            text-decoration: none;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        .social-icon {
            background: #3c2623;
            color: white;
            padding: 10px 13px;
            border-radius: 50%;
            font-size: 18px;
        }

        /* Contact header gradient */

.contact-hero {

    background: #3c2623;;

    border-radius: 18px;

    padding: 28px 24px;

    color: #fff;

    box-shadow: 0 10px 25px rgba(0,0,0,0.08);

}



.contact-hero h2 {

    color: #fff !important;

    margin: 0;

    font-weight: 700;

}



.contact-hero p {

    color: rgba(255,255,255,0.9);

    margin-top: 6px;

    font-size: 0.95rem;

}


/* Contact card form */

.contact-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 22px;
    border: 1px solid #eee;
}

.contact-input {
    background: #f8f8f8;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 12px 14px;
    transition: .2s ease;

}

.contact-input:focus {
    background: #fff;
    border-color: #b44bff;
    box-shadow: 0 0 0 .2rem rgba(180,75,255,.12);

}

.btn-send {
    background: #3c2623;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;

}

.btn-send:hover { opacity: .9; }

    </style>
</head>

<body>

<div class="top-strip text-center py-2">
    <span>Fresh Coffee • Cozy Vibes • Daily Brew</span>
</div>

<nav class="navbar navbar-expand-lg py-3">
  <div class="container">

    <a class="navbar-brand" href="index.html">
      <img src="logo.PNG" alt="Cozy Beans Logo" style="height:150px;">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-4">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="order.html">Place Order</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
      </ul>

      <a class="btn btn-coffee ms-4" href="contact.html">Contact</a>
    </div>

  </div>
</nav>

<div class="container my-5 py-5">

    <div class="row justify-content-center">

    <div class="col-lg-8">



        <!-- Gradient header -->

        <div class="contact-hero mb-4 text-center">

            <h2>Contact Us</h2>

            <p>We are here to help — send us your questions or suggestions</p>

        </div>



        <!-- Form card -->

        <div class="contact-card">

            <form>

                <div class="row g-3">

                    <div class="col-md-6">

                        <input type="text" class="form-control contact-input" placeholder="Name" required>

                    </div>

                    <div class="col-md-6">

                        <input type="email" class="form-control contact-input" placeholder="Email" required>

                    </div>

                    <div class="col-md-6">

                        <input type="tel" class="form-control contact-input" placeholder="Phone">

                    </div>

                    <div class="col-md-6">

                        <input type="text" class="form-control contact-input" placeholder="Subject">

                    </div>

                    <div class="col-12">

                        <textarea rows="6" class="form-control contact-input" placeholder="Message" required></textarea>

                    </div>

                    <div class="col-12 text-end">

                        <button type="submit" class="btn btn-send">Send</button>

                    </div>

                </div>

            </form>

        </div>



        <!-- Optional small text under form -->

        <p class="text-center text-muted mt-3" style="font-size:0.85rem;">

            Office hours: 9:00 – 18:00

        </p>



    </div>

</div>



</div>


<div class="container mb-5">
  <div class="footer-box">
    <div class="row align-items-center">

    
      <div class="col-md-9 mb-3 mb-md-0">
        <div class="d-flex justify-content-between flex-wrap gap-2">
          <a href="index.html" class="footer-link">Home</a>
          <a href="menu.html" class="footer-link">Menu</a>
          <a href="about.html" class="footer-link">About Us</a>
          <a href="contact.html" class="footer-link">Contact Us</a>
        </div>
      </div>

     
      <div class="col-md-3 text-md-end text-center">
        <div class="d-flex justify-content-md-end justify-content-center gap-2 mb-3">
          <div class="social-icon"><i class="bi bi-instagram"></i></div>
          <div class="social-icon"><i class="bi bi-tiktok"></i></div>
        </div>
        <a href="menu.html" class="btn btn-coffee w-100">
          Menu
        </a>
      </div>

    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
